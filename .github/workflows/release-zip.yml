name: Build And Release Zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (example: v1.0.0)"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag_name }}"
            $name = "${{ github.event.inputs.release_name }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $name = ""
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Tag name is required."
          }

          if ([string]::IsNullOrWhiteSpace($name)) {
            $name = "GenesysExtensionAudit $tag"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Publish app
        shell: pwsh
        run: |
          dotnet restore
          dotnet publish .\src\GenesysExtensionAudit.App\GenesysExtensionAudit.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\artifacts\publish\win-x64

      - name: Create zip
        id: zip
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $zipName = "GenesysExtensionAudit-win-x64-$tag.zip"
          $zipPath = Join-Path (Resolve-Path .\artifacts).Path $zipName

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path .\artifacts\publish\win-x64\* -DestinationPath $zipPath -Force

          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.zip.outputs.zip_path }}
          generate_release_notes: true
